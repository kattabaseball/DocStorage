# =============================================================================
# TourDocs Web - nginx Configuration
# Angular SPA with client-side routing, gzip, and caching
# =============================================================================

worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # =========================================================================
    # Basic Settings
    # =========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # =========================================================================
    # Gzip Compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-javascript
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/opentype
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy
        text/xml;

    # =========================================================================
    # Security Headers
    # =========================================================================
    map $sent_http_content_type $security_headers {
        default                          "nosniff";
    }

    # =========================================================================
    # Server Configuration
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # =====================================================================
        # Security Headers
        # =====================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # =====================================================================
        # Static Assets - Aggressive Caching
        # Angular hashed filenames enable long cache durations
        # =====================================================================

        # JavaScript and CSS (hashed by Angular CLI)
        location ~* \.(?:js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Fonts
        location ~* \.(?:woff|woff2|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }

        # Images
        location ~* \.(?:jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
            expires 6M;
            add_header Cache-Control "public";
            access_log off;
        }

        # Media
        location ~* \.(?:mp4|webm|ogg|mp3|wav)$ {
            expires 1M;
            add_header Cache-Control "public";
            access_log off;
        }

        # =====================================================================
        # Angular SPA - Client-Side Routing
        # All routes that don't match a static file fall back to index.html
        # =====================================================================
        location / {
            try_files $uri $uri/ /index.html;

            # index.html should never be cached
            # (it contains references to the latest hashed assets)
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # =====================================================================
        # API Proxy (optional - use if not using separate API domain)
        # Uncomment to proxy API requests to the backend
        # =====================================================================
        # location /api/ {
        #     proxy_pass http://tourdocs-api:7001;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_cache_bypass $http_upgrade;
        #     proxy_read_timeout 300;
        #     proxy_connect_timeout 300;
        #     proxy_send_timeout 300;
        # }

        # =====================================================================
        # SignalR WebSocket Proxy (optional)
        # =====================================================================
        # location /hubs/ {
        #     proxy_pass http://tourdocs-api:7001;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_read_timeout 3600;
        # }

        # =====================================================================
        # Deny access to hidden files
        # =====================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # =====================================================================
        # Health check endpoint
        # =====================================================================
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # =====================================================================
        # Error pages
        # =====================================================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
